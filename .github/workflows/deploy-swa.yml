name: Deploy to Azure Static Web App

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: swa-${{ github.event_name == 'pull_request' && github.head_ref || 'production' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    name: Deploy Infrastructure (when needed)
    outputs:
      should_deploy_infra: ${{ steps.infra-scan.outputs.should_deploy_infra }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect infra changes
        id: infra-scan
        shell: bash
        run: |
          should_deploy_infra=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            should_deploy_infra=true
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
              should_deploy_infra=true
            elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q '^infra/'; then
              should_deploy_infra=true
            fi
          fi

          echo "should_deploy_infra=$should_deploy_infra" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        if: steps.infra-scan.outputs.should_deploy_infra == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        if: steps.infra-scan.outputs.should_deploy_infra == 'true'
        uses: azure/arm-deploy@v2
        id: deploy
        with:
          scope: resourcegroup
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            staticWebAppName=${{ vars.SWA_NAME || 'swa-mfse' }}
            location=${{ vars.AZURE_LOCATION || 'westeurope' }}
            sku=${{ vars.SWA_SKU || 'Free' }}
            repositoryUrl=https://github.com/${{ github.repository }}
            repositoryBranch=main

      - name: Output SWA hostname
        if: steps.infra-scan.outputs.should_deploy_infra == 'true'
        run: echo "Static Web App URL - https://${{ steps.deploy.outputs.defaultHostname }}"

      - name: Infra skipped
        if: steps.infra-scan.outputs.should_deploy_infra != 'true'
        run: echo "No infra changes detected. Skipping infrastructure deployment."

  build-and-deploy:
    needs: deploy-infra
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: /
          output_location: dist

  close-pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR staging environment
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
          app_location: /
