<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <!-- Background glow -->
  <ellipse cx="300" cy="250" rx="260" ry="180" fill="url(#adg)" opacity="0.3"/>
  <!-- Pipeline backbone -->
  <line x1="60" y1="250" x2="540" y2="250" stroke="rgba(140,114,203,0.2)" stroke-width="2" stroke-dasharray="8 4"/>
  <!-- Pipeline stages -->
  <g>
    <!-- Stage 1: Code -->
    <rect x="60" y="210" width="80" height="80" rx="12" fill="rgba(140,114,203,0.1)" stroke="rgba(140,114,203,0.5)" stroke-width="1.5"/>
    <text x="100" y="255" text-anchor="middle" fill="rgba(140,114,203,0.7)" font-family="monospace" font-size="11" font-weight="600">CODE</text>
    <!-- Arrow 1 -->
    <path d="M148 250 L175 250" stroke="rgba(140,114,203,0.5)" stroke-width="2"/>
    <path d="M170 244 L180 250 L170 256" fill="rgba(140,114,203,0.5)"/>
    <!-- Stage 2: Build -->
    <rect x="185" y="210" width="80" height="80" rx="12" fill="rgba(140,114,203,0.12)" stroke="rgba(140,114,203,0.55)" stroke-width="1.5"/>
    <text x="225" y="255" text-anchor="middle" fill="rgba(140,114,203,0.7)" font-family="monospace" font-size="11" font-weight="600">BUILD</text>
    <!-- Arrow 2 -->
    <path d="M273 250 L300 250" stroke="rgba(140,114,203,0.5)" stroke-width="2"/>
    <path d="M295 244 L305 250 L295 256" fill="rgba(140,114,203,0.5)"/>
    <!-- Stage 3: Test -->
    <rect x="310" y="210" width="80" height="80" rx="12" fill="rgba(230,42,118,0.08)" stroke="rgba(230,42,118,0.4)" stroke-width="1.5"/>
    <text x="350" y="255" text-anchor="middle" fill="rgba(230,42,118,0.6)" font-family="monospace" font-size="11" font-weight="600">TEST</text>
    <!-- Arrow 3 -->
    <path d="M398 250 L425 250" stroke="rgba(230,42,118,0.4)" stroke-width="2"/>
    <path d="M420 244 L430 250 L420 256" fill="rgba(230,42,118,0.4)"/>
    <!-- Stage 4: Deploy -->
    <rect x="435" y="210" width="80" height="80" rx="12" fill="rgba(140,114,203,0.15)" stroke="rgba(140,114,203,0.6)" stroke-width="1.5"/>
    <text x="475" y="255" text-anchor="middle" fill="rgba(140,114,203,0.8)" font-family="monospace" font-size="11" font-weight="600">DEPLOY</text>
  </g>
  <!-- Feedback loop -->
  <path d="M475 295 Q475 380 300 380 Q125 380 100 295" stroke="rgba(230,42,118,0.25)" stroke-width="1.5" fill="none" stroke-dasharray="6 3"/>
  <path d="M104 300 L100 290 L94 300" fill="rgba(230,42,118,0.3)"/>
  <text x="300" y="400" text-anchor="middle" fill="rgba(230,42,118,0.35)" font-family="monospace" font-size="10">FEEDBACK</text>
  <!-- Metrics floating -->
  <g opacity="0.5">
    <rect x="80" y="120" width="60" height="28" rx="6" fill="rgba(140,114,203,0.1)" stroke="rgba(140,114,203,0.3)" stroke-width="1"/>
    <text x="110" y="138" text-anchor="middle" fill="rgba(140,114,203,0.5)" font-family="monospace" font-size="8">DORA</text>
    <rect x="440" y="120" width="80" height="28" rx="6" fill="rgba(140,114,203,0.1)" stroke="rgba(140,114,203,0.3)" stroke-width="1"/>
    <text x="480" y="138" text-anchor="middle" fill="rgba(140,114,203,0.5)" font-family="monospace" font-size="8">METRICS</text>
  </g>
  <!-- Decorative dots -->
  <circle cx="45" cy="180" r="3" fill="rgba(140,114,203,0.3)"/>
  <circle cx="555" cy="180" r="3" fill="rgba(140,114,203,0.3)"/>
  <circle cx="200" cy="430" r="2" fill="rgba(140,114,203,0.2)"/>
  <circle cx="400" cy="430" r="2" fill="rgba(140,114,203,0.2)"/>
  <defs>
    <radialGradient id="adg">
      <stop offset="0%" stop-color="rgba(140,114,203,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
