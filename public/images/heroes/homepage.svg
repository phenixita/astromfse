<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <!-- Soft glow -->
  <circle cx="300" cy="250" r="220" fill="url(#hg)" opacity="0.4"/>
  <!-- Connection lines -->
  <g stroke="rgba(140,114,203,0.3)" stroke-width="1.5">
    <line x1="100" y1="180" x2="240" y2="110"/>
    <line x1="100" y1="180" x2="180" y2="310"/>
    <line x1="240" y1="110" x2="380" y2="90"/>
    <line x1="240" y1="110" x2="320" y2="240"/>
    <line x1="180" y1="310" x2="320" y2="240"/>
    <line x1="320" y1="240" x2="460" y2="180"/>
    <line x1="320" y1="240" x2="380" y2="370"/>
    <line x1="380" y1="90" x2="460" y2="180"/>
    <line x1="460" y1="180" x2="500" y2="320"/>
    <line x1="380" y1="370" x2="500" y2="320"/>
    <line x1="180" y1="310" x2="280" y2="400"/>
    <line x1="280" y1="400" x2="380" y2="370"/>
