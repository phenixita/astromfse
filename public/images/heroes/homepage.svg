  <circle cx="300" cy="150" r="3" fill="rgba(140,114,203,0.35)"/>
  <circle cx="430" cy="260" r="3" fill="rgba(230,42,118,0.35)"/>
  <circle cx="140" cy="260" r="3" fill="rgba(140,114,203,0.25)"/>
  <circle cx="360" cy="300" r="3" fill="rgba(140,114,203,0.25)"/>
  <circle cx="520" cy="240" r="2" fill="rgba(140,114,203,0.2)"/>
  <circle cx="60" cy="220" r="2" fill="rgba(140,114,203,0.2)"/>
  <!-- Inner glow dots on key nodes -->
  <circle cx="320" cy="240" r="8" fill="rgba(230,42,118,0.2)"/>
  <circle cx="100" cy="180" r="6" fill="rgba(140,114,203,0.2)"/>
  <circle cx="460" cy="180" r="6" fill="rgba(140,114,203,0.2)"/>
  <defs>
    <radialGradient id="hg">
      <stop offset="0%" stop-color="rgba(140,114,203,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
