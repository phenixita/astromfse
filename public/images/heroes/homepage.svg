  <!-- Primary nodes -->
  <circle cx="100" cy="180" r="26" fill="rgba(140,114,203,0.15)" stroke="rgba(140,114,203,0.6)" stroke-width="2"/>
  <circle cx="240" cy="110" r="22" fill="rgba(140,114,203,0.12)" stroke="rgba(140,114,203,0.5)" stroke-width="2"/>
  <circle cx="180" cy="310" r="20" fill="rgba(140,114,203,0.12)" stroke="rgba(140,114,203,0.5)" stroke-width="2"/>
  <circle cx="320" cy="240" r="30" fill="rgba(230,42,118,0.1)" stroke="rgba(230,42,118,0.45)" stroke-width="2"/>
  <circle cx="380" cy="90" r="16" fill="rgba(140,114,203,0.1)" stroke="rgba(140,114,203,0.4)" stroke-width="1.5"/>
  <circle cx="460" cy="180" r="24" fill="rgba(140,114,203,0.15)" stroke="rgba(140,114,203,0.6)" stroke-width="2"/>
  <circle cx="380" cy="370" r="18" fill="rgba(230,42,118,0.08)" stroke="rgba(230,42,118,0.35)" stroke-width="1.5"/>
  <circle cx="500" cy="320" r="14" fill="rgba(140,114,203,0.1)" stroke="rgba(140,114,203,0.4)" stroke-width="1.5"/>
  <circle cx="280" cy="400" r="16" fill="rgba(140,114,203,0.1)" stroke="rgba(140,114,203,0.4)" stroke-width="1.5"/>
