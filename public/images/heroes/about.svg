<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <!-- Glow -->
  <circle cx="300" cy="150" r="140" fill="url(#abg)" opacity="0.35"/>
  <!-- Abstract profile silhouette with tech nodes -->
  <g>
    <!-- Central geometric shape -->
    <circle cx="300" cy="120" r="50" fill="rgba(140,114,203,0.06)" stroke="rgba(140,114,203,0.35)" stroke-width="1.5"/>
    <rect x="260" y="180" width="80" height="60" rx="8" fill="rgba(140,114,203,0.05)" stroke="rgba(140,114,203,0.3)" stroke-width="1.5"/>
    <!-- Radiating skill nodes -->
    <g stroke="rgba(140,114,203,0.2)" stroke-width="1">
      <line x1="260" y1="100" x2="170" y2="70"/>
      <line x1="340" y1="100" x2="430" y2="70"/>
      <line x1="260" y1="140" x2="160" y2="160"/>
      <line x1="340" y1="140" x2="440" y2="160"/>
      <line x1="270" y1="240" x2="180" y2="260"/>
      <line x1="330" y1="240" x2="420" y2="260"/>
    </g>
    <!-- Skill nodes -->
    <circle cx="170" cy="70" r="16" fill="rgba(140,114,203,0.08)" stroke="rgba(140,114,203,0.35)" stroke-width="1"/>
    <text x="170" y="74" text-anchor="middle" fill="rgba(140,114,203,0.45)" font-family="monospace" font-size="7">DevOps</text>
    <circle cx="430" cy="70" r="16" fill="rgba(140,114,203,0.08)" stroke="rgba(140,114,203,0.35)" stroke-width="1"/>
    <text x="430" y="74" text-anchor="middle" fill="rgba(140,114,203,0.45)" font-family="monospace" font-size="7">K8s</text>
    <circle cx="160" cy="160" r="14" fill="rgba(230,42,118,0.06)" stroke="rgba(230,42,118,0.3)" stroke-width="1"/>
    <text x="160" y="164" text-anchor="middle" fill="rgba(230,42,118,0.4)" font-family="monospace" font-size="7">Team</text>
    <circle cx="440" cy="160" r="14" fill="rgba(230,42,118,0.06)" stroke="rgba(230,42,118,0.3)" stroke-width="1"/>
    <text x="440" y="164" text-anchor="middle" fill="rgba(230,42,118,0.4)" font-family="monospace" font-size="7">AI</text>
    <circle cx="180" cy="260" r="12" fill="rgba(140,114,203,0.06)" stroke="rgba(140,114,203,0.25)" stroke-width="1"/>
    <text x="180" y="264" text-anchor="middle" fill="rgba(140,114,203,0.35)" font-family="monospace" font-size="6">.NET</text>
    <circle cx="420" cy="260" r="12" fill="rgba(140,114,203,0.06)" stroke="rgba(140,114,203,0.25)" stroke-width="1"/>
    <text x="420" y="264" text-anchor="middle" fill="rgba(140,114,203,0.35)" font-family="monospace" font-size="6">Cloud</text>
    <!-- Inner silhouette detail -->
    <circle cx="300" cy="110" r="20" fill="rgba(140,114,203,0.08)" stroke="rgba(140,114,203,0.2)" stroke-width="1"/>
  </g>
  <!-- Decorative -->
  <circle cx="80" cy="40" r="2" fill="rgba(140,114,203,0.2)"/>
  <circle cx="520" cy="40" r="2" fill="rgba(140,114,203,0.2)"/>
  <defs>
    <radialGradient id="abg">
      <stop offset="0%" stop-color="rgba(140,114,203,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
